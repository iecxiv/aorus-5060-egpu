# aorus-egpu-watchdog.conf — telemetry hardening for eGPU freeze events
#
# Companion to: docs/freeze-2026-05-05-investigation.md (Phase 1c B2).
# Paired with: etc/kernel/cmdline.txt crashkernel reservation.
#
# Default Fedora 43 ships with NMI watchdog enabled (kernel.nmi_watchdog=1)
# and threshold 10s, but does NOT panic on hardlockup detection — meaning
# a wedged kernel just sits there printing warnings (or doesn't, if dmesg
# isn't being flushed) until manually power-cycled.
#
# These settings convert hardlockup detection into a panic, which combined
# with kdump's crashkernel reservation produces a vmcore on next boot.
# Without these, today's Mode B freeze (2026-05-05 16:50) would still be
# undiagnosable from kernel state alone.
#
# Layer: L5 (pure config). Reversible by removing this file +
# `sysctl --system` reload.

# Hard lockup detected by NMI watchdog → panic. Required for kdump to fire.
# Without this, NMI watchdog only WARNs (and may not even succeed if dmesg
# is wedged). With this + crashkernel reserved, kernel kexec's into
# crashkernel and dumps vmcore.
kernel.hardlockup_panic = 1

# Soft lockup (CPU loop > 22s by default) → panic. Defense in depth for
# freezes that don't trigger NMI watchdog.
kernel.softlockup_panic = 1

# Capture all-CPU backtrace on hardlockup detection (helps post-mortem
# even when kdump fails).
kernel.hardlockup_all_cpu_backtrace = 1
kernel.softlockup_all_cpu_backtrace = 1

# Panic on oops (kernel-detected internal inconsistency). Don't try to
# limp on after a memory corruption or BUG().
kernel.panic_on_oops = 1

# Panic on RCU stall (>21s by default) — RCU stalls usually mean a CPU
# is wedged in a kernel critical section, which on this stack is the
# kind of thing that would freeze us silently.
kernel.panic_on_rcu_stall = 1

# Panic on NMI from I/O port that the kernel can't recover from
# (some PCIe error escalation paths use this).
kernel.panic_on_io_nmi = 1

# After panic, wait this many seconds then auto-reboot. 0 = hang
# (current default). Setting to 30s gives kdump time to run + a
# short window for someone watching the console to grab info, then
# auto-recovers without manual power-cycle. Set to 0 if you prefer
# the host to hang for forensic capture.
kernel.panic = 30

# Enable all SysRq functions. Required by aorus-egpu-observability-watchdog
# for the 'l' (CPU backtrace), 't' (task stacks), 'w' (blocked tasks),
# 'm' (memory state) triggers — those triggers are gated behind bit 4
# (debugging dumps) of the kernel.sysrq bitmask. Setting to 1 enables
# all functions; we accept that as the safer-than-not-having-debug
# trade-off for this development/test stack.
#
# Per docs/service-retirement-roadmap.md, this also retires when the
# observability watchdog retires (gated on full in-driver recovery).
kernel.sysrq = 1
