# AORUS Lever M-recover production posture (2026-05-08).
#
# Engages the in-driver WPR2-stuck recovery path (Patch 0024 + 0026 +
# 0027 + 0028) at module load. Phase 1-4 testing complete; Phase 5
# evidence collection (n>=10 PROVEN cold-cold-boot recoveries via the
# in-driver path) accumulates with this file in place.
#
# The L4 backup helper (aorus-egpu-wpr2-recovery.service) remains active
# during evidence collection. M-recover is faster (kernel context, ~700ms)
# so it usually wins; if it doesn't, the L4 helper still recovers.
# After Phase 5 gate is met, the L4 service is retired per
# docs/service-retirement-roadmap.md and this file becomes the only
# recovery mechanism.
#
# Kill-switch escape: sudo aorus-egpu-lever-m disable && sudo reboot
# That writes /var/lib/aorus-egpu/lever-m-killswitch=0 which the driver
# reads at module init and overrides this Enable=1 to 0 (H3 hardening).

options nvidia NVreg_AorusLeverMRecoverEnable=1
