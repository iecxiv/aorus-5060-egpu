# Shadow of /usr/lib/modprobe.d/nvidia.conf shipped by the NVIDIA-CUDA-repo
# nvidia-driver RPM. Per modprobe.conf(5), a file with the same name in
# /etc/modprobe.d/ takes precedence over the vendor file.
#
# Why we shadow:
#
# (1) The vendor file contains:
#       softdep nvidia post: nvidia-uvm nvidia-drm
#     Every time the nvidia module loads, modprobe's softdep handling
#     ALSO loads nvidia-drm. nvidia-drm creates a /dev/dri/card<N> entry,
#     which GNOME mutter picks up as an additional display device. On
#     this Blackwell-over-Thunderbolt stack, the result is a hard freeze
#     at GNOME login (every boot, deterministically) once the eGPU is
#     bound and our loader's `modprobe --ignore-install nvidia` fires.
#     `--ignore-install` only bypasses the `install /bin/false` directive;
#     it does NOT bypass softdep handling.
#
#     We remove the softdep entirely. Our loader manages nvidia_uvm
#     explicitly (modprobe --ignore-install nvidia_uvm); we never want
#     nvidia-drm loaded in compute-only mode.
#
# (2) The vendor file sets:
#       options nvidia NVreg_EnableS0ixPowerManagement=1
#       options nvidia NVreg_PreserveVideoMemoryAllocations=1
#     Both default to vendor's "typical workstation that suspends"
#     posture. We are a headless compute box that never suspends.
#     Vendor defaults wire up VRAM preserve and S0ix code paths we
#     never exercise. Flipping both to 0 drops dead code from the
#     driver runtime, consistent with our other NVreg tuning in
#     aorus-egpu-compute-only.conf.
#
# What we keep from the vendor verbatim:
#   - nouveau / nova-core blacklist. Defence-in-depth.
#   - NVreg_TemporaryFilePath=/var/tmp. Driver crash-dump location.

blacklist nouveau
blacklist nova-core

# softdep nvidia post: nvidia-uvm nvidia-drm    <- REMOVED (see header).

options nvidia NVreg_TemporaryFilePath=/var/tmp
options nvidia NVreg_EnableS0ixPowerManagement=0
options nvidia NVreg_PreserveVideoMemoryAllocations=0
