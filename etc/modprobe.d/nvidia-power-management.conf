# Shadows /usr/lib/modprobe.d/nvidia-power-management.conf shipped by the
# nvidia-driver RPM. Per modprobe.conf(5):
#
#   "files of the same name in /etc/modprobe.d/ take precedence over those
#    in /usr/lib/modprobe.d/"
#
# So putting a same-named file here makes modprobe ignore the vendor one
# entirely. This is the canonical way to override a vendor modprobe.d
# entry.
#
# What the vendor file sets:
#   options nvidia NVreg_PreserveVideoMemoryAllocations=1
#   options nvidia NVreg_TemporaryFilePath=/var/tmp
#
# What we want different:
#   - PreserveVideoMemoryAllocations=0 (was 1). We are a headless compute
#     box that never suspends; the default-1 code paths preserve VRAM
#     contents across suspend/resume cycles we never trigger. Disabling
#     drops dead code from the driver runtime path. Setting this also in
#     aorus-5090-compute-only.conf is redundant but kept there for intent
#     documentation; both files set =0 so there is no conflict.
#
# What we keep verbatim:
#   - NVreg_TemporaryFilePath=/var/tmp - where the driver writes crash
#     dumps and similar artefacts. /var/tmp is fine for a server.

options nvidia NVreg_PreserveVideoMemoryAllocations=0
options nvidia NVreg_TemporaryFilePath=/var/tmp
